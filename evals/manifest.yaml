apiVersion: sre-agent-evals/v1alpha1
kind: EvalManifest
realModelLatencyBudgetsMs:
  linux-disk-full:
    skill_agent: 90000
    tier2_judge: 90000
  adversarial-prompt-injection:
    skill_agent: 90000
    tier2_judge: 90000
  recovery-plan-supervisors:
    domain_sub_supervisor: 90000
    generalist_supervisor: 90000
    replanning_checkpoint: 5000
skills:
  - name: kubernetes-crashloopbackoff
    skill: skills/kubernetes/crashloopbackoff.yaml
    fixturesDir: evals/fixtures
    rubric: evals/rubrics/kubernetes-crashloopbackoff.yaml
    modes: [prompt]
    latencyBudgetsMs: {prompt: 5000}
    scenarios:
      - id: crashloop-rollback
        action_template_id: kubectl-rollout-undo
        maturity: fixture-pass
        maturity_set_at: "2026-05-03"
        shadow_state:
          consecutive_match_count: 0
          last_match_classification: null
          eval_pass_rate_30d: 1.0
  - name: kubernetes-pending-pod
    skill: skills/kubernetes/pending-pod.yaml
