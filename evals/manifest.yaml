        deployment_cohorts:
          - service: checkout-api
            environment: prod
            region_cluster: us-east-1/prod-a
            deployable_artifact: checkout-api
            phase: shadow
            enabled: true
        promotion_gates:
          confidence_threshold: 0.85
          consecutive_matches_required: 50
          time_horizon_days: 30
          outcome_attribution_min_ratio: 0.80
          successful_resolution_min_ratio: 0.95
        equivalence_policy:
          params_canonicalization:
            - host_alias
            - rotated_log_archive_generation
        shadow_state:
          consecutive_match_count: 0
          last_match_classification: null
          eval_pass_rate_30d: 1.0
