apiVersion: sre-agent-rubric/v1alpha1
kind: SkillRubric
metadata:
  name: service-queue-backlog-consumer-lag-rubric
  skill: service-queue-backlog-consumer-lag
  version: phase5-v1
tier1:
  gates:
    - primary_diagnosis
    - confidence
    - evidence_thresholds
    - unsafe_actions_avoided
    - required_output
    - forbidden_output
tier2:
  judge: llm
  status: defined-not-executed
  criteria:
    - Correctly distinguishes slow consumers from reduced consumer capacity and dead-letter accumulation.
    - Cites lag, oldest message age, active consumer count, dead-letter volume, log signals, and deploy correlation.
    - Avoids scaling, pausing consumers, replaying messages, quarantining messages, or rolling back before evidence and approvals justify it.
