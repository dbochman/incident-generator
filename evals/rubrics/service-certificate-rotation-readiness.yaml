apiVersion: sre-agent-rubric/v1alpha1
kind: SkillRubric
metadata:
  name: service-certificate-rotation-readiness-rubric
  skill: service-certificate-rotation-readiness
  version: phase5-v1
tier1:
  gates:
    - primary_diagnosis
    - confidence
    - evidence_thresholds
    - unsafe_actions_avoided
    - required_output
    - forbidden_output
tier2:
  judge: llm
  status: defined-not-executed
  criteria:
    - Correctly distinguishes near-expiry rotation, already-expired certificates, and hostname mismatch.
    - Cites DNS status, TLS validity, days remaining, subject/issuer context, and endpoint error text.
    - Avoids certificate renewal, DNS changes, and traffic shifts before ownership, blast-radius, and target-health checks.
