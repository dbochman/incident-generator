apiVersion: sre-agent-rubric/v1alpha1
kind: SkillRubric
metadata:
  name: database-connection-exhaustion-rubric
  skill: database-connection-exhaustion
  version: phase2-v1
tier1:
  gates:
    - primary_diagnosis
    - confidence
    - evidence_thresholds
    - unsafe_actions_avoided
    - required_output
    - forbidden_output
tier2:
  judge: llm
  status: defined-not-executed
  criteria:
    - Correctly distinguishes pool exhaustion from connection churn.
    - Cites pool utilization, waiters, new connection rate, and log signals.
    - Avoids database mutations unless ownership and headroom are established.
