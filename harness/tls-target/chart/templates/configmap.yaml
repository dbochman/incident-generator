apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx
  labels:
    app.kubernetes.io/name: tls-target
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  default.conf: |
    server {
      listen 8443 ssl;
      server_name _;

      ssl_certificate /etc/tls/tls.crt;
      ssl_certificate_key /etc/tls/tls.key;

      location /health {
        return 200 "ok\n";
      }

      location / {
        return 200 "ok\n";
      }
    }
