    release_manifest_paths:
      - benchmark_release.scenario_hashes[name=linux-memory-oom-oom-kill]
      - benchmark_release.benchmark_sets[benchmark_set_id=individual-live-20260505]
      - benchmark_release.benchmark_set_aliases.aliases[alias=alpha-individual]
    learner_visible_evidence:
      - id: memory-summary
        ref: evals/linux-memory-fixtures/linux-memory-oom-kill/outputs/memory_summary.txt
        observation: The host has 30.5G of 32G memory used, 850MB available, and swap is mostly used.
      - id: oom-events
        ref: evals/linux-memory-fixtures/linux-memory-oom-kill/outputs/oom_events.txt
        observation: The kernel killed process 8421 named api-worker during an out-of-memory event.
      - id: top-memory-processes
        ref: evals/linux-memory-fixtures/linux-memory-oom-kill/outputs/top_memory_processes.txt
        observation: api-worker was using 18.4G RSS and 57.5% memory.
    expected_hypotheses:
      - id: oom_killed_process
        confidence: high
        rationale: Kernel OOM events, exhausted memory, swap pressure, and top-process RSS all point to an OOM-killed api-worker.
    supervised_response: |-
      ## Diagnosis

      `oom_killed_process` with high confidence.

      ## Evidence

      - `memory-summary`: the host is nearly out of memory and swap is mostly consumed.
      - `oom-events`: the kernel killed pid 8421, `api-worker`, in an out-of-memory event.
      - `top-memory-processes`: `api-worker` was the dominant resident-memory process at 18.4G RSS.

      ## Uncertainty

      The killed process is clear, but the evidence does not yet distinguish a leak, traffic surge, or workload-size change.

      ## Next Checks

      1. Review api-worker memory trend, deploy timing, and request volume.
      2. Check cgroup limits and recent workload changes before proposing capacity or restart actions.

      ## Action Boundary

      Do not restart services, kill processes, or increase memory limits until the owner reviews the read-only findings.
    redaction_checks:
      - checked_release_manifest_refs
      - checked_learner_visible_evidence_only
      - checked_no_credentials_or_personal_data
      - checked_no_hidden_evidence_role_labels
      - checked_no_process_or_capacity_mutation_recommendation
    validation_commands: *seed_validation_commands

