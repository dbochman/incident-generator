image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

target:
  host: postgres-target
  port: 5432
  database: checkout
  user: postgres
  password: test-only-not-a-secret

service:
  name: pgbench-loadgen

loadgen:
  connectionMode: hold
  clients: 32
  activeConnections: 30
  reservedConnections: 1
  transactionsPerSecond: 50
  durationSeconds: 600
  scale: 1
  initialize: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi
