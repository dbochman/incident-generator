apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: misbehaving-app
    app.kubernetes.io/instance: {{ .Release.Name }}
    service: {{ .Values.app.serviceName }}
spec:
  selector:
    app.kubernetes.io/name: misbehaving-app
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http

