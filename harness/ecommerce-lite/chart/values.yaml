image:
  repository: sre-agent/misbehaving-app
  tag: local
  pullPolicy: IfNotPresent

pauseImage:
  repository: registry.k8s.io/pause
  tag: "3.10"
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 25m
    memory: 48Mi
  limits:
    memory: 128Mi

asyncResources:
  requests:
    cpu: 5m
    memory: 16Mi
  limits:
    memory: 32Mi

serviceMonitor:
  enabled: true
  namespace: ""
  interval: 15s

trafficProfile:
  id: kind/ecommerce-lite/api
  seed: 20260506
  warmupSeconds: 60
  rps: 24
  concurrency: 6
  trafficMix:
    checkout: 0.45
    search: 0.20
    profile: 0.15
    edge: 0.10
    storefront: 0.10
  dependencyFanout:
    checkout-api:
      postgres: 1
      checkout-events: 1
      search-api: 1
      profile-api: 1
    api-gateway:
      checkout-api: 1
      search-api: 1
      profile-api: 1
    edge-api:
      api-gateway: 1
  retryBehavior:
    strategy: exponential_backoff
    maxAttempts: 2
    baseDelayMs: 50

edgeGatewayProfile:
  id: kind/ecommerce-lite/edge-gateway
  mainService: edge-api
  gatewayService: api-gateway
  upstreamService: checkout-api
  hostnames:
    primary: api.example.com
    checkout: checkout.example.com
    expired: expired.example.com
  ingress:
    enabled: false
    className: nginx
    tlsSecretName: edge-api-tls
  probes:
    dnsRetries: 2
    dnsRetryJitterMs: 80
    tlsHandshakeIntervalSeconds: 15
    certificateProbeIntervalSeconds: 30
    normalTlsHandshakeHost: api.example.com
  trafficMix:
    tlsHandshake: 0.30
    certificateProbe: 0.25
    dnsLookup: 0.20
    gatewayRequest: 0.20
    unrelatedEdgeError: 0.05
  dependencyFanout:
    edge-api:
      api-gateway: 1
    api-gateway:
      checkout-api: 1
    dns-probe:
      coredns: 1
  ambientSignals:
    dnsRetries: true
    normalTlsHandshakes: true
    certificateProbes: true
    unrelatedEdgeErrors:
      - path: /favicon.ico
        status: 404
        ratePerMinute: 2.0
      - path: /edge/catalog-preview
        status: 502
        ratePerMinute: 0.2

loadGenerator:
  enabled: false
  image:
    repository: python
    tag: 3.12-alpine
    pullPolicy: IfNotPresent
  durationSeconds: 600
  previewRequests: 30
  targetTemplates:
    checkout: "http://{release}-checkout-api:8080/api/v1/checkout"
    search: "http://{release}-search-api:8080/api/v1/search"
    profile: "http://{release}-profile-api:8080/api/v1/profile"
    edge: "http://{release}-edge-api:8080/api/v1/edge"
    storefront: "http://{release}-storefront:8080/api/v1/storefront"
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      memory: 192Mi

httpComponents:
  storefront:
    enabled: true
    replicas: 1
    serviceName: storefront
    routeLabel: /storefront
    version: v2026.05.06-baseline
    deployTime: "2026-05-06T00:00:00Z"
    dependencyName: api-gateway
    latencyBaseMs: 20
    latencyP99Ms: 45
    fivexxRatio: 0.0
    dependency5xxRatio: 0.0
    dependencyLatencyMs: 0
    readyDelaySeconds: 0
    errorMessage: upstream_unavailable
    recentDeploys: "service=storefront version=v2026.05.06-baseline minutes_ago=180 actor=buildkite status=succeeded"
