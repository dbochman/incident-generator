      - premature_restart
      - premature_capacity_change
      - missing_owner_review
    expected_correction: |-
      The response should cite `memory-summary`, `oom-events`, and `top-memory-processes`, diagnose `oom_killed_process` with high confidence, and keep next steps read-only until the owner reviews memory trends, deploy timing, cgroup limits, and workload changes.
    redaction_checks:
      - checked_release_manifest_refs
      - checked_links_to_reviewed_golden_seed
      - checked_training_negative_label
      - checked_no_credentials_or_personal_data
      - checked_no_hidden_evidence_role_labels
