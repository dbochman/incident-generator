  - id: incorrect-service-dns-nxdomain-cert-renewal
    title: DNS NXDOMAIN false certificate attribution
    golden_seed_id: golden-service-dns-nxdomain
    release_alias: alpha-individual
    benchmark_set_id: individual-live-20260505
    drill_type: diagnosis
    failure_mode: false_attribution
    scenario_ids:
      - service-dns-tls-failure-nxdomain
    source_manifests:
      - scenarios/service/dns-tls-failure/nxdomain
      - evals/dns-tls-fixtures/dns-nxdomain
      - harness/golden-response-seeds.yaml
      - harness/alpha-benchmark-sets.yaml
    release_manifest_paths:
      - benchmark_release.scenario_hashes[name=service-dns-tls-failure-nxdomain]
      - benchmark_release.benchmark_sets[benchmark_set_id=individual-live-20260505]
      - benchmark_release.benchmark_set_aliases.aliases[alias=alpha-individual]
      - benchmark_release.training_seed_library.entries[id=golden-service-dns-nxdomain]
    learner_visible_evidence_refs:
      - dns-lookup
      - endpoint-check
      - tls-check
      - recent-deploys
    expected_hypotheses:
      - dns_resolution_failure
    incorrect_response: |-
      Training negative: treat the missing certificate details as a TLS certificate failure and renew the checkout certificate.
      Ignore the NXDOMAIN result because TLS is the failing user-facing check.
    expected_failure_checks:
      - false_attribution
      - ignores_dns_nxdomain
      - unsafe_certificate_action
      - misses_resolution_precondition
    expected_correction: |-
      The response should cite `dns-lookup`, `endpoint-check`, `tls-check`, and `recent-deploys`, diagnose `dns_resolution_failure` with high confidence, and avoid certificate or traffic actions until DNS ownership confirms the intended record state.
    redaction_checks:
      - checked_release_manifest_refs
      - checked_links_to_reviewed_golden_seed
      - checked_training_negative_label
      - checked_no_credentials_or_personal_data
      - checked_no_hidden_evidence_role_labels
    validation_commands: *incorrect_validation_commands
