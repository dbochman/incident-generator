image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

exporter:
  image:
    repository: quay.io/prometheuscommunity/postgres-exporter
    tag: "v0.15.0"
    pullPolicy: IfNotPresent
  port: 9187

postgres:
  password: test-only-not-a-secret
  database: checkout
  maxConnections: 25
  sharedBuffers: 32MB

service:
  port: 5432

serviceMonitor:
  enabled: true
  namespace: ""
  interval: 15s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

exporterResources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi
