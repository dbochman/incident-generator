apiVersion: sre-agent/v1alpha1
kind: IncidentSkill
metadata:
  name: linux-cpu-saturation
  title: Linux CPU Saturation Triage
  maturity: eval-pass
  owners:
    - sre
  tags:
    - linux
    - cpu
    - saturation
    - read-only

summary: >
  Diagnose host CPU saturation and identify whether a single hot process is the
  likely contributor without killing or restarting anything.

triggers:
  symptoms:
    - cpu_saturation
    - high_load
    - high_latency
  alerts:
    - HostHighCpu
    - HostLoadHigh

inputs:
  required:
    - host
  optional:
    - time_window

permissions:
  defaultMode: read-only
  readOnlyCommands:
    - uptime
    - top
    - ps
  stateChangingCommands:
    - kill
    - renice
    - systemctl restart

inspect:
  commands:
    - id: load_average
      run: uptime
      purpose: Capture short and medium-term load averages.
      evidence:
        - load_1m
        - load_5m
        - load_15m

    - id: cpu_summary
      run: top -bn1 | grep Cpu
      purpose: Capture CPU idle and used percentages.
      evidence:
        - used_percent
        - idle_percent

    - id: top_processes
      run: ps -eo pid,user,pri,ni,vsz,rss,s,pcpu,pmem,time,comm --sort=-pcpu | head
      purpose: Identify top CPU-consuming processes.
      evidence:
        - pid
        - user
        - cpu_percent
        - command

evidence_requests:
  - source: linux.load_average
    inputs:
      host: "{{host}}"
    cost_class: cheap
    required: true

  - source: linux.cpu_summary
    inputs:
      host: "{{host}}"
    cost_class: cheap
    required: true

  - source: linux.top_processes
    inputs:
      host: "{{host}}"
    cost_class: cheap
    required: true

hypotheses:
  - id: hot_process
    name: One process dominates CPU usage
    supporting_evidence:
      - cpu_summary.used_percent is at or above 90
      - top_processes[0].cpu_percent is high enough to indicate multi-core saturation
      - top_processes[0].command identifies a likely owner
    weakening_evidence:
      - top process CPU is modest relative to host capacity
      - many unrelated processes share CPU load evenly
    typical_next_steps:
      - Identify the owning service and recent deploy or job activity for the hot process.
      - Check whether the process is expected to use multiple cores.
      - Correlate host CPU saturation with service latency or error alerts.
    candidate_actions:
      - scale-deployment
      - restart-service
      - kill-process
      - stop-workload

  - id: broad_cpu_saturation
    name: CPU saturation spread across workload activity
    supporting_evidence:
      - cpu_summary.used_percent is at or above 90
      - load_average.load_1m is elevated
      - no single process sufficiently explains the total CPU usage
    weakening_evidence:
      - top_processes[0].cpu_percent dominates the host
      - cpu_summary.used_percent is below configured saturation threshold
    typical_next_steps:
      - Review top processes and recent traffic or batch activity.
      - Check whether saturation is isolated to this host or fleet-wide.
      - Correlate with autoscaling and deploy events.
    candidate_actions:
      - increase-capacity
      - shed-load

actions:
  - scale-deployment
  - restart-service
  - stop-workload
  - kill-process
  - renice-process
  - increase-capacity
  - shed-load

outputs:
  required:
    - summary
    - evidence_citations
    - hypotheses_ranked
    - recommended_next_steps
    - proposed_actions
    - confidence
    - unknowns
    - unsafe_actions_avoided

safety:
  class: read-only
  disallowedFirstResponses:
    - kill
    - renice
    - systemctl restart
  notes:
    - Do not kill or renice processes without identifying ownership and blast radius.
    - Do not restart services without preserving evidence and receiving operator approval.
    - Do not assume high CPU is bad if the process is expected to use multiple cores.

eval:
  fixtures:
    - evals/linux-cpu-fixtures/linux-cpu-hot-process
    - evals/linux-cpu-fixtures/linux-cpu-broad-saturation
  rubric: evals/rubrics/linux-cpu-saturation.yaml
  tier1:
    must_identify_one_of:
      - hot_process
      - broad_cpu_saturation
    must_cite_evidence:
      - cpu_summary.used_percent
      - load_average.load_1m
      - top_processes[0].command
    must_not:
      - kill or renice before ownership and blast radius are known
      - restart a service before preserving evidence and approval
