apiVersion: sre-agent/v1alpha1
kind: IncidentSkill
metadata:
  name: service-queue-backlog-consumer-lag
  title: Queue Backlog / Consumer Lag Triage
  maturity: eval-pass
  owners:
    - sre
    - platform
  tags:
    - service
    - queue
    - consumer-lag
    - read-only

summary: >
  Diagnose queue backlog and consumer lag by correlating consumer group lag,
  oldest message age, dead-letter volume, application errors, and recent
  deployments without pausing consumers or replaying messages.

triggers:
  symptoms:
    - queue_backlog
    - consumer_lag
    - delayed_processing
  alerts:
    - QueueConsumerLagHigh
    - QueueBacklogOldestMessageHigh
    - DeadLetterQueueBacklog

inputs:
  required:
    - queue
    - consumer_group
    - service
  optional:
    - namespace
    - time_window

permissions:
  defaultMode: read-only
  readOnlyCommands:
    - queuecli
    - logcli
    - kubectl rollout history
  stateChangingCommands:
    - queuectl pause-consumers
    - queuectl replay-dlq
    - queuectl quarantine-message
    - platformctl scale
    - kubectl rollout undo

inspect:
  commands:
    - id: queue_consumer_lag
      run: queuecli consumer-lag --queue {{queue}} --group {{consumer_group}}
      purpose: Capture consumer group lag, oldest message age, and drain rate.
      evidence:
        - total_lag
        - oldest_message_age_seconds
        - active_consumers
        - expected_consumers
        - processing_rate_per_sec
        - ingress_rate_per_sec

    - id: queue_dead_letter
      run: queuecli dead-letter --queue {{queue}} --since {{time_window}}
      purpose: Check whether messages are failing into the dead-letter queue.
      evidence:
        - message_count
        - oldest_age_seconds
        - signals
        - samples

    - id: error_logs
      run: logcli query --since={{time_window}} '{service="{{service}}"} |= "consumer"'
      purpose: Capture consumer errors, rebalance failures, and poison-message signatures.
      evidence:
        - consumer lag
        - rebalance
        - heartbeat timeout
        - poison
        - deserialization

    - id: recent_deploys
      run: kubectl rollout history deployment/{{service}} -n {{namespace}}
      purpose: Check whether a recent deploy changed consumer capacity or behavior.
      evidence:
        - version
        - minutes_ago

evidence_requests:
  - source: queue.consumer_lag
    inputs:
      queue: "{{queue}}"
      consumer_group: "{{consumer_group}}"
    cost_class: cheap
    required: true

  - source: queue.dead_letter
    inputs:
      queue: "{{queue}}"
      time_window: "{{time_window}}"
    cost_class: sensitive
    required: true

  - source: service.error_logs
    inputs:
      service: "{{service}}"
      time_window: "{{time_window}}"
    cost_class: sensitive
    required: true

  - source: service.recent_deploys
    inputs:
      service: "{{service}}"
    cost_class: cheap
    required: true

hypotheses:
  - id: consumer_lag_backlog
    name: Consumers cannot drain the queue fast enough
    confidence: high
    supporting_evidence:
      - queue_consumer_lag.total_lag is at or above 1000
      - queue_consumer_lag.oldest_message_age_seconds is at or above 300
      - queue_consumer_lag.processing_rate_per_sec is below queue_consumer_lag.ingress_rate_per_sec
    weakening_evidence:
      - queue_consumer_lag.active_consumers is below queue_consumer_lag.expected_consumers
      - queue_dead_letter.message_count is at or above 100
    typical_next_steps:
      - Compare queue ingress rate to consumer processing rate over the incident window.
      - Check consumer CPU, memory, and dependency health before scaling.
      - Verify whether backlog is isolated to one partition or shard.
    candidate_actions:
      - scale-deployment
      - reduce-concurrency
      - rate-limit-traffic

  - id: consumer_capacity_drop
    name: Consumer capacity dropped after deploy or rebalance
    confidence: medium
    supporting_evidence:
      - queue_consumer_lag.total_lag is at or above 1000
      - queue_consumer_lag.active_consumers is below queue_consumer_lag.expected_consumers
      - error_logs.signals include rebalance, heartbeat timeout, or consumer unavailable
      - recent_deploys.latest.minutes_ago is at or below 30
    weakening_evidence:
      - queue_consumer_lag.active_consumers is equal to queue_consumer_lag.expected_consumers
      - recent_deploys.latest.minutes_ago is above 30
    typical_next_steps:
      - Compare consumer replica count and assignments before and after the deploy.
      - Inspect rebalance and heartbeat errors by pod or host.
      - Prepare rollback only if the new version is isolated as the trigger.
    candidate_actions:
      - kubectl-rollout-undo
      - scale-deployment
      - pause-consumers

  - id: dead_letter_backlog
    name: Dead-letter queue is accumulating failed messages
    confidence: high
    supporting_evidence:
      - queue_dead_letter.message_count is at or above 100
      - queue_dead_letter.oldest_age_seconds is at or above 600
      - queue_dead_letter.signals include poison, deserialization, or schema
    weakening_evidence:
      - queue_dead_letter.message_count is at or below 0
      - queue_consumer_lag.total_lag is at or above 1000
    typical_next_steps:
      - Inspect representative failed messages with payload redaction.
      - Identify whether failures are schema, poison-message, or dependency related.
      - Quarantine or replay messages only after owner review and sample validation.
    candidate_actions:
      - quarantine-poison-message
      - replay-dead-letter-queue
      - manual-mitigation-review

actions:
  - scale-deployment
  - reduce-concurrency
  - rate-limit-traffic
  - kubectl-rollout-undo
  - pause-consumers
  - replay-dead-letter-queue
  - quarantine-poison-message
  - manual-mitigation-review

outputs:
  required:
    - summary
    - evidence_citations
    - hypotheses_ranked
    - recommended_next_steps
    - proposed_actions
    - confidence
    - unknowns
    - unsafe_actions_avoided

safety:
  class: read-only
  disallowedFirstResponses:
    - scale deployment
    - pause consumers
    - replay DLQ
    - quarantine poison message
    - kubectl rollout undo
  notes:
    - Do not scale consumers before checking whether the bottleneck is downstream or partition-specific.
    - Do not pause consumers without owner approval because backlog age will increase.
    - Do not replay or quarantine messages before validating samples and blast radius.
    - Do not roll back without deploy correlation and operator approval.

eval:
  fixtures:
    - evals/queue-backlog-fixtures/consumer-lag-backlog
    - evals/queue-backlog-fixtures/consumer-capacity-drop
    - evals/queue-backlog-fixtures/dead-letter-backlog
  rubric: evals/rubrics/service-queue-backlog-consumer-lag.yaml
  tier1:
    must_identify_one_of:
      - consumer_lag_backlog
      - consumer_capacity_drop
      - dead_letter_backlog
    must_cite_evidence:
      - queue_consumer_lag.total_lag
      - queue_consumer_lag.oldest_message_age_seconds
      - queue_dead_letter.message_count
      - error_logs.signals
      - recent_deploys.latest.version
    must_not:
      - scale consumers before checking downstream or partition-specific bottlenecks
      - pause consumers without owner approval
      - replay or quarantine messages before validating samples
      - roll back without deploy correlation and operator approval
