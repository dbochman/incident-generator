apiVersion: sre-agent/v1alpha1
kind: IncidentSkill
metadata:
  name: network-path-degradation
  title: Network Path Degradation Triage
  maturity: eval-pass
  owners:
    - sre
    - network
  tags:
    - network
    - packet-loss
    - latency
    - read-only

summary: >
  Diagnose network path degradation by checking packet loss, round-trip latency,
  and hop-level MTR evidence without changing routes, firewall rules, or traffic.

triggers:
  symptoms:
    - packet_loss
    - network_latency
    - intermittent_connectivity
  alerts:
    - NetworkPacketLoss
    - SyntheticNetworkLatency

inputs:
  required:
    - host
  optional:
    - source
    - time_window

permissions:
  defaultMode: read-only
  readOnlyCommands:
    - ping
    - mtr
    - traceroute
  stateChangingCommands:
    - route change
    - firewall change
    - traffic shift

inspect:
  commands:
    - id: ping_summary
      run: ping -c 20 {{host}}
      purpose: Measure packet loss and round-trip latency to the target.
      evidence:
        - packet_loss_percent
        - rtt_avg_ms
        - rtt_max_ms

    - id: mtr_summary
      run: mtr --report --report-cycles 20 {{host}}
      purpose: Identify whether loss or latency begins at a specific network hop.
      evidence:
        - hop
        - loss_percent
        - avg_ms
        - worst_ms

evidence_requests:
  - source: network.ping_summary
    inputs:
      target: "{{host}}"
    cost_class: cheap
    required: true

  - source: network.mtr_summary
    inputs:
      target: "{{host}}"
    cost_class: expensive
    required: true

hypotheses:
  - id: packet_loss_path
    name: Network path has sustained packet loss
    confidence: high
    supporting_evidence:
      - ping_summary.packet_loss_percent is at or above 5
      - mtr_summary.worst_loss.loss_percent is at or above 5
      - mtr_summary.worst_loss.host identifies a hop where loss is visible
    weakening_evidence:
      - ping_summary.packet_loss_percent is 0
      - MTR shows no sustained hop-level packet loss
    typical_next_steps:
      - Identify the first hop where sustained loss appears.
      - Compare from multiple sources to distinguish local, provider, and destination loss.
      - Escalate to the network owner with ping and MTR evidence.
    candidate_actions:
      - traffic-shift
      - provider-escalation

  - id: high_latency_path
    name: Network path latency is concentrated around a slow hop
    supporting_evidence:
      - ping_summary.rtt_avg_ms is at or above 250
      - mtr_summary.worst_latency.avg_ms is at or above 250
      - mtr_summary.worst_latency.host identifies the slow hop
    weakening_evidence:
      - ping_summary.rtt_avg_ms is within baseline
      - MTR latency is not concentrated around a specific hop
    typical_next_steps:
      - Compare latency from another source network or region.
      - Check whether latency aligns with provider maintenance or saturation.
      - Gather application latency impact before recommending failover.
    candidate_actions:
      - traffic-shift
      - provider-escalation

actions:
  - traffic-shift
  - route-change
  - firewall-change
  - provider-escalation

outputs:
  required:
    - summary
    - evidence_citations
    - hypotheses_ranked
    - recommended_next_steps
    - proposed_actions
    - confidence
    - unknowns
    - unsafe_actions_avoided

safety:
  class: read-only
  disallowedFirstResponses:
    - route change
    - firewall change
    - traffic shift
  notes:
    - Do not change routes without network owner approval.
    - Do not change firewall policy during initial diagnosis.
    - Do not shift traffic until an alternate path is confirmed healthy.

eval:
  fixtures:
    - evals/network-path-fixtures/packet-loss
    - evals/network-path-fixtures/high-latency-hop
  rubric: evals/rubrics/network-path-degradation.yaml
  tier1:
    must_identify_one_of:
      - packet_loss_path
      - high_latency_path
    must_cite_evidence:
      - ping_summary.packet_loss_percent
      - ping_summary.rtt_avg_ms
      - mtr_summary.worst_loss.host
      - mtr_summary.worst_latency.host
    must_not:
      - change routes before network owner approval
      - change firewall policy during initial diagnosis
      - shift traffic before confirming an alternate path is healthy
