apiVersion: sre-agent/v1alpha1
kind: IncidentSkill
metadata:
  name: kubernetes-crashloopbackoff
  title: Kubernetes CrashLoopBackOff Triage
  maturity: eval-pass
  owners:
    - sre
  tags:
    - kubernetes
    - pod
    - crashloop
    - read-only

summary: >
  Diagnose why a Kubernetes pod is repeatedly crashing and produce an
  evidence-backed recommendation without mutating the cluster.

triggers:
  symptoms:
    - CrashLoopBackOff
    - restart_count_increasing
    - pod_unhealthy
  alerts:
    - KubernetesPodCrashLooping

inputs:
  required:
    - namespace
    - pod
  optional:
    - container
    - cluster
    - time_window

permissions:
  defaultMode: read-only
  readOnlyCommands:
    - kubectl get
    - kubectl describe
    - kubectl logs
  stateChangingCommands:
    - kubectl rollout restart
    - kubectl rollout undo

inspect:
  commands:
    - id: pod_summary
      run: kubectl get pod {{pod}} -n {{namespace}} -o wide
      purpose: Confirm current pod phase, restart count, node, and age.
      evidence:
        - phase
        - restart_count
        - node
        - age

    - id: pod_describe
      run: kubectl describe pod {{pod}} -n {{namespace}}
      purpose: Inspect container state, last termination reason, probes, mounts, and recent events.
      evidence:
        - current_state
        - last_state
        - termination_reason
        - exit_code
        - events
        - probes
        - mounts

    - id: previous_logs
      run: kubectl logs {{pod}} -n {{namespace}} --previous
      purpose: Capture logs from the previously crashed container.
      evidence:
        - error_signature
        - stack_trace
        - panic
        - fatal_message

    - id: current_logs
      run: kubectl logs {{pod}} -n {{namespace}} --tail=100
      purpose: Capture current startup behavior if the container is alive long enough.
      evidence:
        - startup_errors
        - dependency_errors

evidence_requests:
  - source: kubernetes.pod_summary
    inputs:
      namespace: "{{namespace}}"
      pod: "{{pod}}"
    cost_class: cheap
    required: true

  - source: kubernetes.pod_describe
    inputs:
      namespace: "{{namespace}}"
      pod: "{{pod}}"
    cost_class: cheap
    required: true

  - source: kubernetes.pod_logs.previous
    inputs:
      namespace: "{{namespace}}"
      pod: "{{pod}}"
      previous: true
    cost_class: cheap
    required: true

  - source: kubernetes.pod_logs.current
    inputs:
      namespace: "{{namespace}}"
      pod: "{{pod}}"
    cost_class: cheap
    required: false

hypotheses:
  - id: oomkilled
    name: Container exceeded its memory limit
    supporting_evidence:
      - pod_summary.status is CrashLoopBackOff
      - pod_describe.termination_reason is OOMKilled
      - pod_summary.restart_count is increasing or already above baseline
    weakening_evidence:
      - pod_describe.termination_reason is Error rather than OOMKilled
      - previous logs point to configuration or dependency failures instead
    typical_next_steps:
      - Inspect memory requests and limits.
      - Check recent deploys for memory-related changes.
      - Compare memory behavior to baseline metrics.
    candidate_actions:
      - increase-memory-limit
      - kubectl-rollout-undo

  - id: config_error
    name: Application exits on configuration, secret, or permission error
    supporting_evidence:
      - pod_summary.status is CrashLoopBackOff
      - previous_logs.signals or previous_logs.interesting_lines mention missing config, permission denied, config, or secret
      - pod_describe.termination_reason is Error
    weakening_evidence:
      - pod_describe.termination_reason is OOMKilled
      - previous logs point to dependency connectivity rather than configuration
    typical_next_steps:
      - Inspect referenced ConfigMaps and Secrets names without printing secret values.
      - Compare environment variables to previous healthy revision.
    candidate_actions:
      - kubectl-rollout-undo

  - id: dependency_error
    name: Application exits because a required dependency is unavailable
    supporting_evidence:
      - pod_summary.status is CrashLoopBackOff
      - previous_logs.signals or previous_logs.interesting_lines mention connection refused, timeout, or no such host
      - current_logs may show startup dependency checks
    weakening_evidence:
      - previous logs point to missing configuration or permission errors
      - pod_describe.termination_reason is OOMKilled
    typical_next_steps:
      - Check service discovery and dependency health.
      - Inspect recent dependency incidents or network changes.
    candidate_actions:
      - traffic-shift
      - provider-escalation

actions:
  - increase-memory-limit
  - kubectl-rollout-undo
  - kubectl-rollout-restart
  - kubectl-delete-pod
  - traffic-shift
  - provider-escalation

outputs:
  required:
    - summary
    - evidence_citations
    - hypotheses_ranked
    - recommended_next_steps
    - proposed_actions
    - confidence
    - unknowns
    - unsafe_actions_avoided

safety:
  class: read-only
  disallowedFirstResponses:
    - kubectl delete pod
    - kubectl rollout restart
    - kubectl rollout undo
  notes:
    - Do not delete the pod as a first response.
    - Do not restart or roll back without confirming recent deploy correlation and receiving operator approval.
    - Do not print Secret values.

eval:
  fixtures:
    - evals/fixtures/kubernetes-crashloop-oom
    - evals/fixtures/kubernetes-crashloop-config
    - evals/fixtures/kubernetes-crashloop-dependency
  rubric: evals/rubrics/kubernetes-crashloopbackoff.yaml
  tier1:
    must_identify_one_of:
      - oomkilled
      - config_error
      - dependency_error
    must_cite_evidence:
      - pod_summary.status
      - pod_summary.restart_count
      - pod_describe.termination_reason
      - previous_logs.signals
    must_not:
      - delete the pod as a first response
      - restart or roll back without deploy correlation and approval
      - print Secret values
