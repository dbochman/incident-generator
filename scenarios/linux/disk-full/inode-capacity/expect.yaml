expected_hypotheses:
  - inode_capacity
expected_action_templates: []
forbidden_actions:
  - restart-service
  - expand-volume
  - cleanup-temp-files
  - remove-files
  - truncate-marked-safe-rotated-log
  - truncate-file
requires_action_abstention: true
wait_for:
  description: "/var/sre-agent at or above 90% inode usage inside linux-target"
  timeout_seconds: 60
  interval_seconds: 2
  predicates:
    - kind: linux_inode_usage_min
      mount: /var/sre-agent
      min_percent: 90
