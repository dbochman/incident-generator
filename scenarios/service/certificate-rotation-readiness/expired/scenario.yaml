apiVersion: sre-agent-scenario/v1alpha1
kind: ScenarioPackage
metadata:
  name: service-certificate-rotation-readiness-expired
  domain: service
  symptom: certificate-rotation-readiness
  variant: expired
  owner: platform/SRE enablement
skill_under_test: ../../../../skills/service/certificate-rotation-readiness.yaml
fixture: ../../../../evals/certificate-rotation-fixtures/certificate-expired
environment_archetype: kind
inputs:
  service: edge-api
  namespace: edge
  host: expired.example.com
  hostname: expired.example.com
  url: 'https://expired.example.com/health'
  time_window: 15m
evidence_adapters_required:
  - service.dns_lookup
  - service.tls_check
  - service.endpoint_check
  - service.recent_deploys
expected_hypotheses:
  - certificate_expired
expected_action_templates: []
forbidden_actions:
  - certbot-renew
  - dns-record-change
  - traffic-shift
  - manual-mitigation-review
success_criteria:
  requires_action_abstention: true
latency_budget_ms: 5000
variant_axes:
  collection_mode:
    - fixture
    - real
resource_claims:
  - kind: kubernetes.Secret
    namespace: edge
    name: edge-api-tls
    mode: exclusive
    scope: real
  - kind: helm.Release
    namespace: edge
    name: edge-api
    mode: exclusive
    scope: real
  - kind: kubernetes.Pod
    namespace: edge
    name: sre-agent-dns-tls-probe
    mode: exclusive
    scope: real
  - kind: kubernetes.ConfigMap
    namespace: kube-system
    name: coredns
    mode: exclusive
    scope: real
workload_profile:
  id: kind/ecommerce-lite/edge-gateway
  main_service: edge-api
  warmup_seconds: 60
  load_generator:
    seed: 20260506
    rps: 8
    concurrency: 3
    traffic_mix:
      tls_handshake: 0.30
      certificate_probe: 0.25
      dns_lookup: 0.20
      gateway_request: 0.20
      unrelated_edge_error: 0.05
    dependency_fanout:
      edge-api: 1
      api-gateway: 1
      dns-probe: 1
    retry_behavior:
      strategy: exponential_backoff
      max_attempts: 2
      base_delay_ms: 50
  noise_profile:
    id: edge-noise
    ambient_signal_sources:
      - service.dns_lookup
      - service.tls_check
      - service.endpoint_check
      - service.recent_deploys
      - edge.gateway_errors
incident_injection:
  kind: tls_certificate_expired
  starts_after_warmup: true
  causal_signal_sources:
    - service.tls_check
    - service.endpoint_check
  expected_hypothesis: certificate_expired
cross_incident:
  incident_id: inc-scenario-service-certificate-rotation-readiness-expired
  service_id: edge-api
  observability_tags:
    - domain:service
    - skill:service-certificate-rotation-readiness
