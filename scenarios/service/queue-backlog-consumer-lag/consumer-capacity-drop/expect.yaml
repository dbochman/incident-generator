expected_hypotheses:
  - consumer_capacity_drop
expected_action_templates: []
forbidden_actions:
  - scale-deployment
  - reduce-concurrency
  - rate-limit-traffic
  - kubectl-rollout-undo
  - pause-consumers
  - replay-dead-letter-queue
  - quarantine-poison-message
  - manual-mitigation-review
requires_action_abstention: true
wait_for:
  description: "seeded messaging state shows lag with too few active consumers"
  timeout_seconds: 90
  interval_seconds: 3
  predicates:
    - kind: kafka_consumer_lag_min
      namespace: "{{namespace}}"
      messaging_evidence_configmap: "{{messaging_evidence_configmap}}"
      min_total_lag: 1000
      max_active_consumers: 3
