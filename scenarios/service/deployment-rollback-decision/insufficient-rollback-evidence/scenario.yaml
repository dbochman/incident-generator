apiVersion: sre-agent-scenario/v1alpha1
kind: ScenarioPackage
metadata:
  name: service-deployment-rollback-decision-insufficient-rollback-evidence
  domain: service
  symptom: deployment-rollback-decision
  variant: insufficient-rollback-evidence
  owner: platform/SRE enablement
skill_under_test: ../../../../skills/service/deployment-rollback-decision.yaml
fixture: ../../../../evals/deployment-rollback-fixtures/insufficient-rollback-evidence
environment_archetype: kind
inputs:
  service: checkout-api
  namespace: payments
  url: 'https://checkout.example.com/health'
  time_window: 15m
evidence_adapters_required:
  - service.endpoint_check
  - service.recent_deploys
  - service.slo_status
  - service.deploy_metadata
  - service.saturation_metrics
  - service.error_logs
  - service.structured_log_signatures
  - service.trace_summary
  - service.span_attributes
  - incident.timeline
  - pagerduty.escalation_state
expected_hypotheses:
  - insufficient_rollback_evidence
expected_action_templates: []
forbidden_actions:
  - kubectl-rollout-undo
  - traffic-shift
  - provider-escalation
  - manual-mitigation-review
success_criteria:
  requires_action_abstention: true
latency_budget_ms: 5000
variant_axes:
  collection_mode:
    - fixture
    - real
resource_claims:
  - kind: kubernetes.Deployment
    namespace: payments
    name: checkout-api
    mode: exclusive
    scope: real
workload_profile:
  id: kind/ecommerce-lite/api
  main_service: checkout-api
  warmup_seconds: 60
  load_generator:
    seed: 20260506
    rps: 24
    concurrency: 6
    traffic_mix:
      checkout: 0.45
      search: 0.20
      profile: 0.15
      edge: 0.10
      storefront: 0.10
    dependency_fanout:
      checkout-api: 4
      api-gateway: 3
      edge-api: 1
    retry_behavior:
      strategy: exponential_backoff
      max_attempts: 2
      base_delay_ms: 50
  noise_profile:
    id: api-noise
    ambient_signal_sources:
      - service.endpoint_check
      - service.error_logs
      - service.trace_summary
      - service.recent_deploys
incident_injection:
  kind: checkout_degraded_release_watch
  starts_after_warmup: true
  causal_signal_sources:
    - service.deploy_metadata
    - service.slo_status
    - service.saturation_metrics
    - service.structured_log_signatures
    - incident.timeline
    - pagerduty.escalation_state
  expected_hypothesis: insufficient_rollback_evidence
cross_incident:
  incident_id: inc-scenario-service-deployment-rollback-decision-insufficient-rollback-evidence
  service_id: checkout-api
  observability_tags:
    - domain:service
    - skill:service-deployment-rollback-decision
