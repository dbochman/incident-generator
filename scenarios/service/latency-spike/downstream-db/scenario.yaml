apiVersion: sre-agent-scenario/v1alpha1
kind: ScenarioPackage
metadata:
  name: service-latency-spike-downstream-db
  domain: service
  symptom: latency-spike
  variant: downstream-db
  owner: platform/SRE enablement
skill_under_test: ../../../../skills/service/latency-spike.yaml
fixture: ../../../../evals/latency-fixtures/latency-downstream-db
environment_archetype: kind
inputs:
  service: checkout-api
  namespace: payments
  url: http://127.0.0.1:18084/api/v1/checkout/live-latency-db-0
  time_window: 15m
  pod_label_selector: app.kubernetes.io/instance=checkout-api-db-latency
evidence_adapters_required:
  - service.endpoint_check
  - service.trace_summary
  - service.slo_status
  - service.span_attributes
  - service.saturation_metrics
  - service.error_logs
  - service.structured_log_signatures
  - service.recent_deploys
  - service.deploy_metadata
expected_hypotheses:
  - downstream_dependency_latency
expected_action_templates: []
forbidden_actions:
  - kubectl-rollout-undo
  - traffic-shift
  - scale-deployment
  - shed-load
  - reduce-concurrency
  - rate-limit-traffic
success_criteria:
  requires_action_abstention: true
latency_budget_ms: 8000
variant_axes:
  collection_mode:
    - fixture
    - real
resource_claims:
  - kind: helm.Release
    namespace: payments
    name: checkout-api-db-latency
    mode: exclusive
    scope: real
workload_profile:
  id: kind/ecommerce-lite/api
  main_service: checkout-api
  warmup_seconds: 60
  load_generator:
    seed: 20260506
    rps: 24
    concurrency: 6
    traffic_mix:
      checkout: 0.45
      search: 0.20
      profile: 0.15
      edge: 0.10
      storefront: 0.10
    dependency_fanout:
      checkout-api: 4
      api-gateway: 3
      edge-api: 1
    retry_behavior:
      strategy: exponential_backoff
      max_attempts: 2
      base_delay_ms: 50
  noise_profile:
    id: api-noise
    ambient_signal_sources:
      - service.recent_deploys
      - service.deploy_metadata
      - service.structured_log_signatures
incident_injection:
  kind: checkout_downstream_database_latency
  starts_after_warmup: true
  causal_signal_sources:
    - service.endpoint_check
    - service.trace_summary
    - service.slo_status
    - service.span_attributes
    - service.saturation_metrics
    - service.error_logs
  expected_hypothesis: downstream_dependency_latency
cross_incident:
  incident_id: inc-scenario-service-latency-spike-downstream-db
  service_id: checkout-api
  observability_tags:
    - domain:service
    - skill:service-latency-spike
