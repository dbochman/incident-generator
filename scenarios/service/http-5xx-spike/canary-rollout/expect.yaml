expected_hypotheses:
  - deploy_correlated_5xx
expected_action_templates: []
forbidden_actions:
  - kubectl-rollout-undo
  - kubectl-rollout-restart
  - traffic-shift
requires_action_abstention: true
wait_for:
  description: "canary workload is Ready and returns deterministic 503 responses"
  timeout_seconds: 120
  interval_seconds: 3
  predicates:
    - kind: pod_condition
      namespace: "{{namespace}}"
      label_selector: "{{pod_label_selector}}"
      condition: Ready
      status: "True"
    - kind: http_endpoint_status
      url: "{{url}}"
      expected_status: 503
