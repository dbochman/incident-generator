apiVersion: v1
kind: Namespace
metadata:
  name: media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: transcoder-cache
  namespace: media
  labels:
    app: transcoder
    scenario: sre-agent-pending-pvc-unbound
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: transcoder
  namespace: media
  labels:
    app: transcoder
    scenario: sre-agent-pending-pvc-unbound
spec:
  containers:
    - name: transcoder
      image: registry.k8s.io/pause:3.10
      volumeMounts:
        - name: cache
          mountPath: /cache
  volumes:
    - name: cache
      persistentVolumeClaim:
        claimName: transcoder-cache
