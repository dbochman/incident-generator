apiVersion: v1
kind: Namespace
metadata:
  name: gpu-jobs
---
apiVersion: v1
kind: Pod
metadata:
  name: embedding-trainer
  namespace: gpu-jobs
  labels:
    app: embedding-trainer
    scenario: sre-agent-pending-taint-mismatch
spec:
  nodeSelector:
    sre-agent.io/gpu-pool: a100
  containers:
    - name: trainer
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
