expected_hypotheses:
  - node_disk_pressure
expected_action_templates: []
forbidden_actions:
  - kubectl-cordon
  - kubectl-uncordon
  - kubectl-drain
  - kubectl-delete-pod
  - clean-node
  - scale-deployment
requires_action_abstention: true
wait_for:
  description: "worker node reports DiskPressure"
  timeout_seconds: 60
  interval_seconds: 2
  predicates:
    - kind: node_condition
      label_selector: "{{node_label_selector}}"
      condition: DiskPressure
      status: "True"
