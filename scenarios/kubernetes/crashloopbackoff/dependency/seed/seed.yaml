apiVersion: v1
kind: Namespace
metadata:
  name: search
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: search
  labels:
    app: indexer
    scenario: sre-agent-crashloop-dependency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indexer
      scenario: sre-agent-crashloop-dependency
  template:
    metadata:
      labels:
        app: indexer
        scenario: sre-agent-crashloop-dependency
    spec:
      containers:
        - name: indexer
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "2026-05-02T14:22:10Z INFO starting indexer version=2026.05.02-11"
              echo "2026-05-02T14:22:12Z INFO connecting to redis host=redis-cache.search.svc.cluster.local port=6379"
              echo "2026-05-02T14:22:20Z ERROR connection refused while connecting to redis-cache.search.svc.cluster.local:6379"
              echo "2026-05-02T14:22:21Z FATAL dependency check failed; exiting"
              exit 1
